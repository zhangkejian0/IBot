<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>桌面机器人 · 表情系统</title>
    <style>
      html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; background: #0A0A0A; overflow: hidden; }
      body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; color: #ccc; }

      /* 手机横屏：表情铺满可用区域 */
      .face-area {
        width: 100%;
        height: 100%;
      }
      .face-canvas {
        display: block;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
      }
      @media (orientation: landscape) and (max-height: 520px) {
        .face-canvas {
          width: 100%;
          height: 100%;
        }
      }
      @media (orientation: portrait) {
        .face-canvas {
          width: min(100%, 92vw);
          height: auto;
          max-height: 72vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
